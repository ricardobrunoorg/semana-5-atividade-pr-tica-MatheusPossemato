<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe Responsivo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
    <div class="logo">X</div>
    <nav>
        <a href="#">Seguindo</a>
        <a href="#">Procurar</a>
    </nav>
    <input type="text" placeholder="Buscar...">
    <div class="circle"></div>
</header>

<div class="container">

    <aside class="sidebar">
        <div class="user"><div class="icon"></div><div class="line"></div></div>
        <div class="user"><div class="icon"></div><div class="line"></div></div>
        <div class="user"><div class="icon"></div><div class="line"></div></div>
        <div class="user"><div class="icon"></div><div class="line"></div></div>
        <div class="user"><div class="icon"></div><div class="line"></div></div>
        <p class="more">Mostrar mais</p>
    </aside>

    <main class="content">

        <div class="big-image">
            <img src="https://picsum.photos/800/350?random1">
        </div>

        <div class="row">
            <div class="card"><img src="https://picsum.photos/250/150?random2"><div class="card-info"><div class="small-icon"></div><div class="small-line"></div></div></div>
            <div class="card"><img src="https://picsum.photos/250/150?random3"><div class="card-info"><div class="small-icon"></div><div class="small-line"></div></div></div>
            <div class="card"><img src="https://picsum.photos/250/150?random4"><div class="card-info"><div class="small-icon"></div><div class="small-line"></div></div></div>
        </div>

        <div class="row">
            <div class="card"><img src="https://picsum.photos/250/150?random5"><div class="card-info"><div class="small-icon"></div><div class="small-line"></div></div></div>
            <div class="card"><img src="https://picsum.photos/250/150?random6"><div class="card-info"><div class="small-icon"></div><div class="small-line"></div></div></div>
            <div class="card"><img src="https://picsum.photos/250/150?random7"><div class="card-info"><div class="small-icon"></div><div class="small-line"></div></div></div>
        </div>

    </main>

</div>

</body>
</html>
